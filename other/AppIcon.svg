<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow1a" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(139,92,246,0.4)"/>
    </filter>
    <filter id="shadow1b" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="rgba(139,92,246,0.2)"/>
    </filter>
    <clipPath id="clip1">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg1)"/>
  <circle cx="512" cy="512" r="500" fill="url(#glow1)" clip-path="url(#clip1)"/>

  <!-- Small window (background) -->
  <g filter="url(#shadow1b)" opacity="0.4">
    <rect x="90" y="150" width="480" height="380" rx="22" ry="22" fill="#27272a" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>
    <rect x="90" y="150" width="480" height="52" rx="22" ry="22" fill="#3f3f46"/>
    <rect x="90" y="176" width="480" height="26" fill="#3f3f46"/>
    <circle cx="128" cy="176" r="7" fill="#FF6058"/>
    <circle cx="152" cy="176" r="7" fill="#FFBD2E"/>
    <circle cx="176" cy="176" r="7" fill="#28CA42"/>
  </g>

  <!-- Large window (foreground) -->
  <g filter="url(#shadow1a)">
    <rect x="215" y="255" width="610" height="515" rx="26" ry="26" fill="#27272a" stroke="rgba(255,255,255,0.2)" stroke-width="3.5"/>
    <rect x="215" y="255" width="610" height="56" rx="26" ry="26" fill="#3f3f46"/>
    <rect x="215" y="283" width="610" height="28" fill="#3f3f46"/>
    <circle cx="257" cy="283" r="8" fill="#FF6058"/>
    <circle cx="283" cy="283" r="8" fill="#FFBD2E"/>
    <circle cx="309" cy="283" r="8" fill="#28CA42"/>
    <rect x="265" y="355" width="340" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
    <rect x="265" y="389" width="240" height="14" rx="7" fill="rgba(255,255,255,0.05)"/>
    <rect x="265" y="433" width="510" height="287" rx="14" ry="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  </g>

  <!-- Resize handles on big window corners -->
  <g opacity="0.85">
    <rect x="139" y="219" width="52" height="12" rx="6" fill="#8B5CF6"/>
    <rect x="179" y="179" width="12" height="52" rx="6" fill="#8B5CF6"/>
    <rect x="849" y="219" width="52" height="12" rx="6" fill="#8B5CF6"/>
    <rect x="849" y="179" width="12" height="52" rx="6" fill="#8B5CF6"/>
    <rect x="139" y="794" width="52" height="12" rx="6" fill="#8B5CF6"/>
    <rect x="179" y="794" width="12" height="52" rx="6" fill="#8B5CF6"/>
    <rect x="849" y="794" width="52" height="12" rx="6" fill="#8B5CF6"/>
    <rect x="849" y="794" width="12" height="52" rx="6" fill="#8B5CF6"/>
  </g>
</svg>
